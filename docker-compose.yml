version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: massoteric-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-massoteric}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - massoteric-network

  # Next.js App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: massoteric-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/massoteric
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Massoteric}
      # Clerk (set in .env or GitHub Secrets)
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/feed}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/onboarding}
      # Stripe (set in .env or GitHub Secrets)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STANDARD=${STRIPE_PRICE_STANDARD}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      # Other
      - POLYMARKET_API_BASE=${POLYMARKET_API_BASE:-https://gamma-api.polymarket.com}
      - KALSHI_API_BASE=${KALSHI_API_BASE:-https://trading-api.kalshi.com/trade-api/v2}
      - KALSHI_API_KEY=${KALSHI_API_KEY}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS:-dev-user-123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - massoteric-network
    volumes:
      - ./node_modules:/app/node_modules
      - ./next_config:/app/.next

volumes:
  postgres_data:

networks:
  massoteric-network:
    driver: bridge
